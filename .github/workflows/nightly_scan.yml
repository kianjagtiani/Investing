name: Nightly Stock Scan Trigger

on:
  schedule:
    - cron: '0 17 * * 1-5'  # 10:30 PM IST = 17:00 UTC, weekdays only
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render and trigger scan
        run: |
          curl -f -X POST "${{ secrets.RENDER_URL }}/api/scan/trigger" \
            -H "X-Scan-Secret: ${{ secrets.SCAN_SECRET }}" \
            --max-time 30 || echo "Scan triggered (app may still be starting)"
