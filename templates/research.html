{% extends "base.html" %}
{% block title %}Research — MKTS{% endblock %}

{% block head %}
<style>
  /* ── Page layout ── */
  .research-page {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Search section ── */
  .search-section {
    margin-bottom: 28px;
  }

  .search-eyebrow {
    font-family: var(--head);
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin-bottom: 10px;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  #search-ticker {
    background: rgba(100,140,210,0.07);
    border: 1px solid var(--border-hi);
    color: var(--text-bright);
    padding: 12px 18px;
    border-radius: 6px;
    font-size: 1.05rem;
    font-family: var(--mono);
    font-weight: 500;
    width: 240px;
    text-transform: uppercase;
    outline: none;
    letter-spacing: 0.5px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search-ticker:focus {
    border-color: var(--green-bd);
    box-shadow: 0 0 0 3px rgba(6,232,150,0.08);
  }
  #search-ticker::placeholder { color: var(--text-dim); text-transform: none; font-weight: 400; letter-spacing: 0; }

  #search-period-group {
    display: flex;
    gap: 3px;
  }
  .search-period-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--head);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .search-period-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--border-hi); }
  .search-period-btn.active {
    background: var(--green-dim);
    border-color: var(--green-bd);
    color: var(--green);
  }

  #search-btn {
    background: var(--green);
    border: none;
    color: #020c08;
    padding: 11px 26px;
    border-radius: 5px;
    cursor: pointer;
    font-family: var(--head);
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: opacity 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 18px rgba(6,232,150,0.22);
  }
  #search-btn:hover { opacity: 0.88; box-shadow: 0 0 28px rgba(6,232,150,0.35); }

  /* ── Screener section ── */
  .screener-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .screener-header {
    background: var(--surface);
    border-bottom: 1px solid var(--divider);
    padding: 13px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .screener-title {
    font-family: var(--head);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
    margin-right: 4px;
  }

  /* Exchange tabs */
  .exchange-tabs {
    display: flex;
    gap: 3px;
  }
  .exch-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--head);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .exch-tab:hover { border-color: var(--border-hi); color: var(--text); }
  .exch-tab.active {
    background: var(--blue-dim);
    border-color: var(--blue-bd);
    color: var(--blue);
  }

  /* Filters row */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-left: auto;
  }

  .filter-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--head);
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  #min-score-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    background: var(--border-hi);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #min-score-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--blue);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(61,184,245,0.4);
  }

  #min-score-val {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--blue);
    min-width: 24px;
  }

  .phase-select {
    background: rgba(100,140,210,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 3px;
    font-family: var(--head);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: border-color 0.12s;
  }
  .phase-select:focus { border-color: var(--border-hi); }
  .phase-select option { background: var(--card); }

  /* Scan controls */
  .scan-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--divider);
    flex-wrap: wrap;
  }

  #refresh-btn {
    background: transparent;
    border: 1px solid var(--border-hi);
    color: var(--text-dim);
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--head);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  #refresh-btn:hover {
    background: rgba(100,140,210,0.08);
    color: var(--text);
    border-color: var(--blue-bd);
  }
  #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .scan-status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .scan-status-dot.running {
    background: var(--amber);
    box-shadow: 0 0 6px rgba(245,166,35,0.5);
    animation: pulse-dot 1.2s ease-in-out infinite;
  }
  .scan-status-dot.idle { background: var(--green); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  #scan-status-text {
    font-family: var(--head);
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }

  #last-scanned {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Table ── */
  .screener-table-wrap {
    overflow-x: auto;
  }

  table.screener-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.86rem;
  }

  .screener-table thead th {
    background: var(--surface);
    border-bottom: 1px solid var(--border-hi);
    padding: 10px 14px;
    font-family: var(--head);
    font-size: 0.67rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.12s;
  }
  .screener-table thead th:hover { color: var(--text); }
  .screener-table thead th.sorted-asc::after  { content: ' ↑'; color: var(--blue); }
  .screener-table thead th.sorted-desc::after { content: ' ↓'; color: var(--blue); }

  .screener-table tbody tr {
    border-bottom: 1px solid var(--divider);
    cursor: pointer;
    transition: background 0.1s;
  }
  .screener-table tbody tr:hover { background: var(--card-hi); }
  .screener-table tbody tr:last-child { border-bottom: none; }

  .screener-table td {
    padding: 11px 14px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--text);
  }

  .td-ticker {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--text-bright);
  }

  .td-company {
    color: var(--text-dim);
    font-size: 0.82rem;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .td-price {
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .td-level {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-dim);
  }

  .td-rr {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--amber);
  }

  /* Score badge */
  .score-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 3px;
    min-width: 42px;
    text-align: center;
  }
  .score-green  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-bd); }
  .score-amber  { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bd); }
  .score-red    { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-bd);   }

  /* Phase badge */
  .phase-badge-sm {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 3px;
    font-family: var(--head);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .ph-2 { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-bd); }
  .ph-1 { background: var(--blue-dim);  color: var(--blue);  border: 1px solid var(--blue-bd);  }
  .ph-3 { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bd); }
  .ph-4 { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-bd);   }
  .ph-x { background: rgba(130,155,195,0.07); color: var(--text-dim); border: 1px solid var(--border-hi); }

  /* Exchange badge */
  .exch-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid var(--border-hi);
    color: var(--text-dim);
    background: rgba(100,140,210,0.05);
    white-space: nowrap;
  }

  /* Empty state */
  .table-empty {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-dim);
    font-size: 0.9rem;
    font-family: var(--head);
    letter-spacing: 0.3px;
  }

  /* Loading state */
  .table-loading {
    text-align: center;
    padding: 44px 24px;
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .table-spinner {
    display: inline-block;
    width: 22px; height: 22px;
    border: 2px solid var(--border-hi);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin-bottom: 10px;
  }
</style>
{% endblock %}

{% block content %}
<div class="research-page">

  <!-- Search -->
  <div class="search-section">
    <div class="search-eyebrow">Quick Analysis</div>
    <div class="search-bar">
      <input id="search-ticker" type="text" placeholder="RELIANCE · TCS · AAPL · MSFT" maxlength="20" />
      <div id="search-period-group">
        <button class="search-period-btn" data-p="3mo">3M</button>
        <button class="search-period-btn" data-p="6mo">6M</button>
        <button class="search-period-btn active" data-p="1y">1Y</button>
        <button class="search-period-btn" data-p="3y">3Y</button>
      </div>
      <button id="search-btn">Analyze</button>
    </div>
  </div>

  <!-- Screener -->
  <div class="screener-section">

    <!-- Header + filters -->
    <div class="screener-header">
      <span class="screener-title">Screener</span>

      <div class="exchange-tabs">
        <button class="exch-tab active" data-exch="ALL">ALL</button>
        <button class="exch-tab" data-exch="NSE">NSE</button>
        <button class="exch-tab" data-exch="BSE">BSE</button>
        <button class="exch-tab" data-exch="NYSE/NASDAQ">NYSE/NASDAQ</button>
      </div>

      <div class="filter-row">
        <div class="filter-item">
          Min Score
          <input type="range" id="min-score-slider" min="0" max="100" value="0" step="5">
          <span id="min-score-val">0</span>
        </div>
        <div class="filter-item">
          Phase
          <select class="phase-select" id="phase-select">
            <option value="ALL">All</option>
            <option value="Phase 2">Phase 2</option>
            <option value="Phase 1">Phase 1</option>
            <option value="Phase 3">Phase 3</option>
            <option value="Phase 4">Phase 4</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Scan controls -->
    <div class="scan-controls">
      <button id="refresh-btn">Refresh Screener</button>
      <span class="scan-status-dot" id="scan-dot"></span>
      <span id="scan-status-text">—</span>
      <span id="last-scanned"></span>
    </div>

    <!-- Table -->
    <div class="screener-table-wrap">
      <div id="table-state" class="table-loading">
        <div class="table-spinner"></div><br>Loading screener data…
      </div>
      <table class="screener-table" id="screener-table" style="display:none;">
        <thead>
          <tr>
            <th data-col="score">Score</th>
            <th data-col="ticker">Ticker</th>
            <th data-col="company">Company</th>
            <th data-col="exchange">Exchange</th>
            <th data-col="price">Price</th>
            <th data-col="phase">Phase</th>
            <th data-col="t1">T1</th>
            <th data-col="t2">T2</th>
            <th data-col="sl">SL</th>
            <th data-col="rr">R/R</th>
          </tr>
        </thead>
        <tbody id="screener-tbody"></tbody>
      </table>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
/* ── Search ── */
let searchPeriod = '1y';

document.querySelectorAll('.search-period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.search-period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchPeriod = btn.dataset.p;
  });
});

document.getElementById('search-ticker').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('search-btn').click();
});

document.getElementById('search-btn').addEventListener('click', () => {
  const t = document.getElementById('search-ticker').value.trim();
  if (!t) return;
  window.location.href = `/stock/${encodeURIComponent(t.toUpperCase())}?period=${searchPeriod}`;
});

/* ── Screener state ── */
let screenerData = [];
let activeExch = 'ALL';
let minScore = 0;
let activePhase = 'ALL';
let sortCol = 'score';
let sortDir = 'desc';
let scanPollTimer = null;

/* ── Min score slider ── */
const slider = document.getElementById('min-score-slider');
const sliderVal = document.getElementById('min-score-val');
slider.addEventListener('input', () => {
  minScore = parseInt(slider.value, 10);
  sliderVal.textContent = minScore;
  renderTable();
});

/* ── Exchange tabs ── */
document.querySelectorAll('.exch-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.exch-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeExch = tab.dataset.exch;
    fetchScreener();
  });
});

/* ── Phase select ── */
document.getElementById('phase-select').addEventListener('change', e => {
  activePhase = e.target.value;
  renderTable();
});

/* ── Column sort ── */
document.querySelectorAll('.screener-table thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = col === 'score' ? 'desc' : 'asc';
    }
    document.querySelectorAll('.screener-table thead th').forEach(h => {
      h.classList.remove('sorted-asc', 'sorted-desc');
    });
    th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    renderTable();
  });
});

/* ── Fetch screener data ── */
async function fetchScreener() {
  const params = new URLSearchParams({ exchange: activeExch, min_score: minScore });
  try {
    const res = await fetch(`/api/screener?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    screenerData = await res.json();
    renderTable();
  } catch (err) {
    showTableState(`Failed to load screener: ${err.message}`, false);
  }
}

/* ── Render table ── */
function renderTable() {
  let rows = screenerData.filter(r => {
    if (minScore > 0 && (r.score == null || r.score < minScore)) return false;
    if (activePhase !== 'ALL' && r.phase !== activePhase) return false;
    return true;
  });

  // Sort
  rows.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null) av = sortDir === 'asc' ? Infinity : -Infinity;
    if (bv == null) bv = sortDir === 'asc' ? Infinity : -Infinity;
    if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir === 'asc' ? av - bv : bv - av;
  });

  const tbody = document.getElementById('screener-tbody');
  const table = document.getElementById('screener-table');
  const state = document.getElementById('table-state');

  if (rows.length === 0) {
    table.style.display = 'none';
    state.style.display = 'block';
    state.innerHTML = '<div class="table-empty">No results match the current filters.</div>';
    return;
  }

  state.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = rows.map(r => {
    const scoreClass = r.score >= 70 ? 'score-green' : r.score >= 40 ? 'score-amber' : 'score-red';
    const scoreTxt = r.score != null ? r.score.toFixed(0) : '—';

    let phClass = 'ph-x', phLabel = r.phase || '—';
    if (r.phase) {
      if (r.phase.includes('2')) phClass = 'ph-2';
      else if (r.phase.includes('1')) phClass = 'ph-1';
      else if (r.phase.includes('3')) phClass = 'ph-3';
      else if (r.phase.includes('4')) phClass = 'ph-4';
    }

    const fmtN = v => v != null ? parseFloat(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';

    return `<tr onclick="window.location.href='/stock/${encodeURIComponent(r.ticker)}'">
      <td><span class="score-badge ${scoreClass}">${scoreTxt}</span></td>
      <td class="td-ticker">${escHtml(r.ticker)}</td>
      <td class="td-company" title="${escHtml(r.company || '')}">${escHtml(r.company || '—')}</td>
      <td><span class="exch-badge">${escHtml(r.exchange || '—')}</span></td>
      <td class="td-price">${fmtN(r.price)}</td>
      <td><span class="phase-badge-sm ${phClass}">${escHtml(phLabel)}</span></td>
      <td class="td-level">${fmtN(r.t1)}</td>
      <td class="td-level">${fmtN(r.t2)}</td>
      <td class="td-level">${fmtN(r.sl)}</td>
      <td class="td-rr">${r.rr != null ? parseFloat(r.rr).toFixed(2) + 'x' : '—'}</td>
    </tr>`;
  }).join('');
}

function showTableState(html, spinner = true) {
  document.getElementById('screener-table').style.display = 'none';
  const state = document.getElementById('table-state');
  state.style.display = 'block';
  state.innerHTML = spinner
    ? `<div class="table-spinner"></div><br>${html}`
    : `<div class="table-empty">${html}</div>`;
}

/* ── Refresh / scan ── */
document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Scan started…';

  try {
    await fetch('/api/scan/trigger', { method: 'POST' });
    updateScanStatus('running');
    startScanPoll();
  } catch (err) {
    btn.textContent = 'Refresh Screener';
    btn.disabled = false;
  }
});

function startScanPoll() {
  if (scanPollTimer) clearInterval(scanPollTimer);
  scanPollTimer = setInterval(pollScanStatus, 5000);
}

async function pollScanStatus() {
  try {
    const res = await fetch('/api/scan/status');
    const data = await res.json();
    updateScanStatus(data.status);

    if (data.last_scanned) {
      const ts = new Date(data.last_scanned);
      document.getElementById('last-scanned').textContent = `Last scanned: ${ts.toLocaleTimeString()}`;
    }

    if (data.status !== 'running') {
      clearInterval(scanPollTimer);
      scanPollTimer = null;
      const btn = document.getElementById('refresh-btn');
      btn.textContent = 'Refresh Screener';
      btn.disabled = false;
      // Re-fetch screener data after scan completes
      fetchScreener();
    }
  } catch (_) {}
}

function updateScanStatus(status) {
  const dot = document.getElementById('scan-dot');
  const txt = document.getElementById('scan-status-text');
  dot.className = 'scan-status-dot ' + status;
  if (status === 'running') {
    txt.textContent = 'Scan running…';
    txt.style.color = 'var(--amber)';
  } else {
    txt.textContent = 'Idle';
    txt.style.color = 'var(--text-dim)';
  }
}

/* ── Escape HTML ── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Init ── */
(async () => {
  // Check scan status first
  try {
    const res = await fetch('/api/scan/status');
    const data = await res.json();
    updateScanStatus(data.status);
    if (data.last_scanned) {
      const ts = new Date(data.last_scanned);
      document.getElementById('last-scanned').textContent = `Last scanned: ${ts.toLocaleTimeString()}`;
    }
    if (data.status === 'running') startScanPoll();
  } catch (_) {}

  fetchScreener();
})();
</script>
